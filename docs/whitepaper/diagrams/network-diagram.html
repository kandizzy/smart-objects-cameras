<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Smart Classroom — Multi-Agent Network Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --font-heading: "Instrument Serif", Georgia, "Times New Roman", serif;
    --font-sans: "Inter", "Helvetica Neue", -apple-system, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", "Consolas", monospace;
    --text-primary: #1c1917;
    --text-secondary: #57534e;
    --text-muted: #a8a29e;
    --border-subtle: #e7e5e4;
    --bg-page: #fafaf9;

    --color-perception: #f4845f;
    --color-reactive: #34d399;
    --color-human: #fbbf24;
    --color-discord: #a78bfa;
    --color-vjepa: #38bdf8;
    --color-orchestrator: #94a3b8;
    --color-infra: #57534e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-page); color: var(--text-secondary); font-family: var(--font-sans); overflow-x: hidden; }

  #nav {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: var(--bg-page); display: flex; align-items: center;
    justify-content: space-between; padding: 0 24px; z-index: 100;
    border-bottom: 1px solid var(--border-subtle);
  }
  #nav a {
    font-size: 0.85rem; font-family: var(--font-mono); color: var(--text-muted);
    text-decoration: none; border-bottom: 1px solid var(--border-subtle); transition: color 0.15s;
  }
  #nav a:hover { color: var(--text-secondary); }
  #nav-title {
    font-family: var(--font-heading); font-size: 1.4rem; font-style: italic;
    font-weight: 400; color: var(--text-primary); letter-spacing: -0.01em;
  }

  #controls {
    position: fixed; top: 68px; right: 16px; z-index: 90;
    background: #fff; border: 1px solid var(--border-subtle); border-radius: 8px;
    padding: 12px 16px; font-size: 0.75rem; font-family: var(--font-mono);
    color: var(--text-secondary); display: flex; flex-direction: column; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  #controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #controls input[type="checkbox"] { accent-color: var(--color-reactive); }
  #controls button {
    margin-top: 4px; padding: 4px 10px; border: 1px solid var(--border-subtle);
    border-radius: 4px; background: #fff; font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--text-secondary); cursor: pointer;
    transition: background 0.15s;
  }
  #controls button:hover { background: #f5f5f4; }

  #tooltip {
    position: fixed; pointer-events: none; background: #1e2130; border: 1px solid #333;
    border-radius: 8px; padding: 12px 16px; font-size: 13px; max-width: 300px;
    line-height: 1.6; opacity: 0; transition: opacity .15s; z-index: 200;
    font-family: var(--font-mono); color: #ccc;
  }
  #tooltip strong { display: block; margin-bottom: 4px; font-size: 14px; color: #fff; }
  #tooltip .tt-type { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  #tooltip .tt-list { font-size: 11px; color: #999; margin-top: 4px; }

  #main-svg { display: block; margin: 0 auto; }

  @keyframes bus-pulse {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  @media print {
    #nav, #controls, #tooltip { display: none; }
    body { padding: 0; }
  }
</style>
</head>
<body>

<nav id="nav">
  <a href="../../index.html">&larr; Back to docs</a>
  <div id="nav-title">Multi-Agent Network</div>
  <a href="../multi-agent-classroom.md" download>Source document &darr;</a>
</nav>

<div id="controls">
  <label><input type="checkbox" id="tog-people"> People (15)</label>
  <label><input type="checkbox" id="tog-fov"> Camera FOV</label>
  <label><input type="checkbox" id="tog-lines" checked> Connections</label>
  <button id="btn-export">Export SVG</button>
</div>

<div id="tooltip"></div>
<svg id="main-svg"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ─── Data ─────────────────────────────────────────────────────────────────

const ROOM = { w: 100, h: 65 }; // room coordinate space

const CAMERAS = [
  { id: "poe-l",    label: "PoE-L",    type: "poe",  x: 8,  y: 4, fov: 110, range: 28 },
  { id: "poe-r",    label: "PoE-R",    type: "poe",  x: 92, y: 4, fov: 110, range: 28 },
  { id: "poe-c",    label: "PoE-C",    type: "poe",  x: 50, y: 61, fov: 100, range: 25 },
  { id: "orbit",    label: "Orbit",    type: "oakd", x: 12, y: 32, fov: 72, range: 20 },
  { id: "gravity",  label: "Gravity",  type: "oakd", x: 30, y: 55, fov: 72, range: 20 },
  { id: "horizon",  label: "Horizon",  type: "oakd", x: 78, y: 50, fov: 72, range: 20 },
];

const INFRA = [
  { id: "pi-orbit",   label: "Pi 5",   x: 12, y: 36, camera: "orbit" },
  { id: "pi-gravity", label: "Pi 5",   x: 30, y: 59, camera: "gravity" },
  { id: "pi-horizon", label: "Pi 5",   x: 78, y: 54, camera: "horizon" },
  { id: "gpu",        label: "GPU",    x: 8,  y: 60, camera: null },
];

const PROFS = [
  { id: "prof-ck",  label: "CK",    x: 30, y: 10 },
  { id: "prof-bk",  label: "BK",    x: 70, y: 10 },
];

const STUDENTS = [
  { id: "s-phil",    label: "Phil",    project: "gesture-timer", x: 20, y: 22 },
  { id: "s-gordon",  label: "Gordon",  project: "smart-stage",   x: 30, y: 22 },
  { id: "s-feifey",  label: "Feifey",  project: "focus-beam",    x: 40, y: 22 },
  { id: "s-kathy",   label: "Kathy",   project: "echodesk",      x: 50, y: 22 },
  { id: "s-seren",   label: "Seren",   project: "seren-room",    x: 60, y: 22 },
  { id: "s-juju",    label: "JuJu",    project: "gus-mode",      x: 70, y: 22 },
  { id: "s-darren",  label: "Darren",  project: "imprint",       x: 80, y: 22 },
  { id: "s-sophie",  label: "Sophie",  project: "forest-classroom", x: 25, y: 32 },
  { id: "s-ramon",   label: "Ramon",   project: "tony",          x: 40, y: 32 },
  { id: "s-shuyang", label: "Shuyang", project: "assignment-tracker", x: 55, y: 32 },
  { id: "s-yuxuan",  label: "Yuxuan",  project: "seren-room",    x: 65, y: 32 },
  { id: "s-hsk",     label: "Seren K", project: "gus-mode",      x: 50, y: 28 },
  { id: "s-phil2",   label: "Phil C",  project: "gesture-timer",  x: 85, y: 32 },
];

const BUS_Y = 42; // room y-coordinate of the bus bar

const AGENTS = [
  // perception agents (detectors on cameras)
  { id: "person-det",     label: "Person Detector",     type: "perception",     publishes: ["person_change"], subscribes: [] },
  { id: "fatigue-det",    label: "Fatigue Detector",    type: "perception",     publishes: ["fatigue_change"], subscribes: [] },
  { id: "gaze-det",       label: "Gaze Detector",       type: "perception",     publishes: ["gaze_change"], subscribes: [] },
  { id: "whiteboard-det", label: "Whiteboard Reader",   type: "perception",     publishes: ["whiteboard_change"], subscribes: [] },
  { id: "vjepa",          label: "V-JEPA Probe",        type: "classification", publishes: ["probe_classification"], subscribes: [] },

  // reactive agents (student projects)
  { id: "gesture-timer",      label: "Timer",             type: "reactive", student: "Phil",
    publishes: ["timer.started","timer.done"], subscribes: ["timer.offer","room_mode_change"] },
  { id: "smart-stage",        label: "Smart Stage",       type: "reactive", student: "Gordon",
    publishes: ["stage.ready","timer.offer","fiducial.request"], subscribes: ["person_change","probe_classification","room_mode_change","fiducial.detected"] },
  { id: "focus-beam",         label: "Focus Beam",        type: "reactive", student: "Feifey",
    publishes: ["beam.pointed","beam.off"], subscribes: ["probe_classification","room_mode_change"] },
  { id: "echodesk",           label: "EchoDesk",          type: "reactive", student: "Kathy",
    publishes: ["question.submitted","question.displayed"], subscribes: ["room_mode_change","agent.message"] },
  { id: "tony",               label: "Tony",              type: "reactive", student: "Ramon & Shuyang",
    publishes: ["calm.activated","calm.deactivated"], subscribes: ["room_mode_change","person_change"] },
  { id: "gus-mode",           label: "Gus Mode",          type: "reactive", student: "JuJu, Kathy, Seren",
    publishes: ["gus.present","gus.excited","gus.sleeping"], subscribes: ["person_change","room_mode_change"] },
  { id: "forest-classroom",   label: "Forest",            type: "reactive", student: "Sophie",
    publishes: ["forest.mood_set","forest.pulse"], subscribes: ["person_change","room_mode_change"] },
  { id: "imprint",            label: "Imprint",           type: "reactive", student: "Darren",
    publishes: ["handwriting.captured","note.saved"], subscribes: ["whiteboard_change","fiducial.detected"] },
  { id: "seren-room",         label: "Seren's Room",      type: "reactive", student: "Seren & Yuxuan",
    publishes: ["ambience.changed","room.adapted"], subscribes: ["person_change","probe_classification","room_mode_change"] },
  { id: "assignment-tracker", label: "Assignments",       type: "reactive", student: "Shuyang",
    publishes: ["assignment.suggested","assignment.created"], subscribes: ["whiteboard_change","phase_change"] },
  { id: "grammar-coach",      label: "Grammar Coach",     type: "reactive", student: "Yuxuan",
    publishes: ["grammar.feedback"], subscribes: ["person_change"] },
  { id: "nodcheck",           label: "NodCheck",          type: "reactive", student: "Kathy",
    publishes: ["nod.detected","shake.detected"], subscribes: ["person_change"] },

  // interface
  { id: "discord-bot",   label: "Discord Bot",     type: "interface",
    publishes: ["phase.command","agent.message"], subscribes: ["person_change","fatigue_change","whiteboard_change","room_mode_change"] },

  // conductor (designed, not built)
  { id: "orchestrator",  label: "Orchestrator",    type: "conductor",
    publishes: ["room_mode_change","phase_change"], subscribes: ["person_change","fatigue_change","gaze_change","whiteboard_change","probe_classification"] },
];

// ─── Layout constants ──────────────────────────────────────────────────────

const MARGIN = { top: 72, right: 20, bottom: 20, left: 20 };
const SVG_W = 960;
const ROOM_H = 440;
const AGENT_BAND_H = 180;
const SVG_H = MARGIN.top + ROOM_H + AGENT_BAND_H + MARGIN.bottom;

const rx = d3.scaleLinear().domain([0, ROOM.w]).range([MARGIN.left + 40, SVG_W - MARGIN.right - 40]);
const ry = d3.scaleLinear().domain([0, ROOM.h]).range([MARGIN.top + 20, MARGIN.top + ROOM_H - 20]);
const busScreenY = ry(BUS_Y);

// agent node positions in the band below the room
const reactiveAgents = AGENTS.filter(a => a.type === "reactive");
const otherAgents = AGENTS.filter(a => a.type !== "reactive");
const agentBandTop = MARGIN.top + ROOM_H + 20;

reactiveAgents.forEach((a, i) => {
  const cols = 6;
  const col = i % cols;
  const row = Math.floor(i / cols);
  a.sx = MARGIN.left + 80 + col * ((SVG_W - 160) / (cols - 1));
  a.sy = agentBandTop + 30 + row * 50;
});

// position perception agents above the bus in the room area
const percAgents = AGENTS.filter(a => a.type === "perception");
percAgents.forEach((a, i) => {
  a.sx = rx(18 + i * 16);
  a.sy = ry(BUS_Y) - 28;
});

// vjepa near GPU
const vjepa = AGENTS.find(a => a.id === "vjepa");
vjepa.sx = rx(16);
vjepa.sy = ry(56);

// discord bot
const discordBot = AGENTS.find(a => a.id === "discord-bot");
discordBot.sx = SVG_W - 100;
discordBot.sy = agentBandTop + 20;

// orchestrator
const orch = AGENTS.find(a => a.id === "orchestrator");
orch.sx = SVG_W - 100;
orch.sy = agentBandTop + 80;

// ─── Build SVG ─────────────────────────────────────────────────────────────

const svg = d3.select("#main-svg")
  .attr("width", SVG_W)
  .attr("height", SVG_H)
  .attr("viewBox", `0 0 ${SVG_W} ${SVG_H}`)
  .style("max-width", "100%")
  .style("height", "auto")
  .style("margin-top", "56px");

const tip = document.getElementById("tooltip");
function showTip(e, html) {
  tip.innerHTML = html;
  tip.style.opacity = 1;
  tip.style.left = (e.clientX + 14) + "px";
  tip.style.top = (e.clientY - 10) + "px";
}
function hideTip() { tip.style.opacity = 0; }

// Defs
const defs = svg.append("defs");

// Bus gradient
const busGrad = defs.append("linearGradient").attr("id", "bus-grad").attr("x1", "0%").attr("x2", "100%");
busGrad.append("stop").attr("offset", "0%").attr("stop-color", "#0f766e");
busGrad.append("stop").attr("offset", "100%").attr("stop-color", "#2563eb");

// Arrow markers
function addMarker(id, color) {
  defs.append("marker").attr("id", id).attr("viewBox", "0 0 10 6").attr("refX", 10).attr("refY", 3)
    .attr("markerWidth", 8).attr("markerHeight", 5).attr("orient", "auto")
    .append("path").attr("d", "M0,0 L10,3 L0,6 Z").attr("fill", color);
}
addMarker("arrow-pub", "#f4845f");
addMarker("arrow-sub", "#34d399");
addMarker("arrow-discord", "#a78bfa");
addMarker("arrow-vjepa", "#38bdf8");
addMarker("arrow-orch", "#94a3b8");

// Hatched fill for orchestrator
const hatch = defs.append("pattern").attr("id", "hatch").attr("patternUnits", "userSpaceOnUse")
  .attr("width", 6).attr("height", 6);
hatch.append("path").attr("d", "M0,6 l6,-6 M-1,1 l2,-2 M5,7 l2,-2")
  .attr("stroke", "#94a3b8").attr("stroke-width", 1).attr("stroke-opacity", 0.3);

// ─── Layer: Room floor ────────────────────────────────────────────────────

const gRoom = svg.append("g").attr("class", "room-layer");

gRoom.append("rect")
  .attr("x", MARGIN.left).attr("y", MARGIN.top)
  .attr("width", SVG_W - MARGIN.left - MARGIN.right).attr("height", ROOM_H)
  .attr("rx", 12).attr("fill", "#fafaf9").attr("stroke", "#d6d3d1").attr("stroke-width", 1.5);

// Screen at front
gRoom.append("rect")
  .attr("x", rx(35)).attr("y", MARGIN.top).attr("width", rx(65) - rx(35)).attr("height", 6)
  .attr("fill", "#1c1917").attr("opacity", 0.7).attr("rx", 2);
gRoom.append("text").attr("x", rx(50)).attr("y", MARGIN.top + 16)
  .attr("text-anchor", "middle").attr("font-size", 10).attr("font-family", "var(--font-mono)")
  .attr("fill", "#a8a29e").attr("letter-spacing", "0.15em").text("SCREEN");

// Lectern at front — small podium between/in front of the profs
gRoom.append("rect")
  .attr("x", rx(48)).attr("y", ry(7)).attr("width", rx(52) - rx(48)).attr("height", 8)
  .attr("fill", "#a8a29e").attr("opacity", 0.5).attr("rx", 1);
gRoom.append("text").attr("x", rx(50)).attr("y", ry(7) - 2)
  .attr("text-anchor", "middle").attr("font-size", 7).attr("font-family", "var(--font-mono)")
  .attr("fill", "#a8a29e").text("lectern");

// Whiteboard on LEFT WALL — rotated label
gRoom.append("rect")
  .attr("x", MARGIN.left).attr("y", ry(15)).attr("width", 6).attr("height", ry(50) - ry(15))
  .attr("fill", "#e7e5e4").attr("rx", 2);
gRoom.append("text")
  .attr("x", MARGIN.left + 16).attr("y", ry(32))
  .attr("text-anchor", "middle").attr("font-size", 10).attr("font-family", "var(--font-mono)")
  .attr("fill", "#a8a29e").attr("letter-spacing", "0.15em")
  .attr("transform", `rotate(-90, ${MARGIN.left + 16}, ${ry(32)})`)
  .text("WHITEBOARD");

// Blackboard on RIGHT WALL — rotated label
gRoom.append("rect")
  .attr("x", SVG_W - MARGIN.right - 6).attr("y", ry(15)).attr("width", 6).attr("height", ry(50) - ry(15))
  .attr("fill", "#1c1917").attr("opacity", 0.6).attr("rx", 2);
gRoom.append("text")
  .attr("x", SVG_W - MARGIN.right - 16).attr("y", ry(32))
  .attr("text-anchor", "middle").attr("font-size", 10).attr("font-family", "var(--font-mono)")
  .attr("fill", "#a8a29e").attr("letter-spacing", "0.15em")
  .attr("transform", `rotate(90, ${SVG_W - MARGIN.right - 16}, ${ry(32)})`)
  .text("BLACKBOARD");

// Front / Back labels
gRoom.append("text").attr("x", rx(50)).attr("y", MARGIN.top + ROOM_H - 8)
  .attr("text-anchor", "middle").attr("font-size", 9).attr("font-family", "var(--font-mono)")
  .attr("fill", "#c8c4bf").attr("letter-spacing", "0.15em").text("BACK");

// Projector at back-center (near PoE-C)
gRoom.append("rect")
  .attr("x", rx(46)).attr("y", ry(63)).attr("width", rx(54) - rx(46)).attr("height", 10)
  .attr("fill", "#57534e").attr("opacity", 0.5).attr("rx", 2);
gRoom.append("text").attr("x", rx(50)).attr("y", ry(63) + 7)
  .attr("text-anchor", "middle").attr("font-size", 7).attr("font-weight", 500)
  .attr("font-family", "var(--font-mono)").attr("fill", "#fff").text("PROJECTOR");

// Door
gRoom.append("line")
  .attr("x1", rx(88)).attr("y1", MARGIN.top + ROOM_H - 1)
  .attr("x2", rx(96)).attr("y2", MARGIN.top + ROOM_H - 1)
  .attr("stroke", "#fafaf9").attr("stroke-width", 3);
gRoom.append("text").attr("x", rx(92)).attr("y", MARGIN.top + ROOM_H - 8)
  .attr("text-anchor", "middle").attr("font-size", 8).attr("font-family", "var(--font-mono)")
  .attr("fill", "#c8c4bf").text("DOOR");

// ─── Layer: Camera FOV cones ──────────────────────────────────────────────

const gFov = svg.append("g").attr("class", "fov-layer").style("display", "none");

CAMERAS.forEach(cam => {
  const cx = rx(cam.x), cy = ry(cam.y);
  const r = cam.range * 6;
  const halfAngle = (cam.fov / 2) * Math.PI / 180;
  // Point cameras toward center of room
  const centerAngle = Math.atan2(ry(ROOM.h / 2) - cy, rx(ROOM.w / 2) - cx);
  const a1 = centerAngle - halfAngle;
  const a2 = centerAngle + halfAngle;
  const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
  const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
  const largeArc = cam.fov > 180 ? 1 : 0;
  gFov.append("path")
    .attr("d", `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`)
    .attr("fill", cam.type === "poe" ? "#a78bfa" : "#f4845f")
    .attr("opacity", 0.06);
});

// ─── Layer: People ────────────────────────────────────────────────────────

const gPeople = svg.append("g").attr("class", "people-layer").style("display", "none");

PROFS.forEach(p => {
  const g = gPeople.append("g").attr("transform", `translate(${rx(p.x)},${ry(p.y)})`);
  g.append("circle").attr("r", 9).attr("fill", "#fbbf24").attr("opacity", 0.8);
  g.append("text").attr("dy", "0.35em").attr("text-anchor", "middle")
    .attr("font-size", 7).attr("font-weight", 600).attr("fill", "#fff")
    .attr("font-family", "var(--font-mono)").text(p.label);
  g.on("mousemove", e => showTip(e, `<strong>${p.label}</strong><div class="tt-type">Instructor</div>`))
   .on("mouseleave", hideTip);
});

STUDENTS.forEach(s => {
  const g = gPeople.append("g").attr("transform", `translate(${rx(s.x)},${ry(s.y)})`);
  g.append("circle").attr("r", 6).attr("fill", "#a8a29e").attr("opacity", 0.7);
  g.append("text").attr("dy", "-10").attr("text-anchor", "middle")
    .attr("font-size", 7).attr("fill", "#a8a29e")
    .attr("font-family", "var(--font-mono)").text(s.label);
  g.on("mousemove", e => {
    const agent = AGENTS.find(a => a.id === s.project);
    const proj = agent ? agent.label : s.project;
    showTip(e, `<strong>${s.label}</strong><div class="tt-type">Student</div>Project: ${proj}`);
  }).on("mouseleave", hideTip);
});

// ─── Layer: Event Bus ─────────────────────────────────────────────────────

const gBus = svg.append("g").attr("class", "bus-layer");

const busX = MARGIN.left + 50;
const busW = SVG_W - MARGIN.left - MARGIN.right - 100;

gBus.append("rect")
  .attr("x", busX).attr("y", busScreenY - 10)
  .attr("width", busW).attr("height", 20)
  .attr("rx", 10).attr("fill", "url(#bus-grad)")
  .style("animation", "bus-pulse 3s ease-in-out infinite");

gBus.append("text")
  .attr("x", busX + busW / 2).attr("y", busScreenY + 4)
  .attr("text-anchor", "middle").attr("font-size", 10).attr("font-weight", 500)
  .attr("font-family", "var(--font-mono)").attr("fill", "#fff")
  .attr("letter-spacing", "0.08em").text("EVENT BUS  ·  FastAPI + SSE");

// ─── Layer: Infrastructure ────────────────────────────────────────────────

const gInfra = svg.append("g").attr("class", "infra-layer");

INFRA.forEach(inf => {
  const ix = rx(inf.x), iy = ry(inf.y);
  const g = gInfra.append("g").attr("transform", `translate(${ix},${iy})`);
  g.append("rect").attr("x", -12).attr("y", -8).attr("width", 24).attr("height", 16)
    .attr("rx", 3).attr("fill", "#57534e").attr("opacity", 0.8);
  g.append("text").attr("dy", "0.35em").attr("text-anchor", "middle")
    .attr("font-size", 7).attr("font-weight", 500).attr("fill", "#fff")
    .attr("font-family", "var(--font-mono)").text(inf.label);

  // line from Pi to camera
  if (inf.camera) {
    const cam = CAMERAS.find(c => c.id === inf.camera);
    if (cam) {
      gInfra.append("line")
        .attr("x1", ix).attr("y1", iy - 8)
        .attr("x2", rx(cam.x)).attr("y2", ry(cam.y) + 10)
        .attr("stroke", "#57534e").attr("stroke-width", 1).attr("stroke-opacity", 0.4)
        .attr("stroke-dasharray", "2,2");
    }
  }

  g.on("mousemove", e => {
    const desc = inf.camera ? `Connected to ${inf.camera}` : "V-JEPA inference server";
    showTip(e, `<strong>${inf.label}</strong><div class="tt-type">Infrastructure</div>${desc}`);
  }).on("mouseleave", hideTip);
});

// ─── Layer: Camera nodes ──────────────────────────────────────────────────

const gCams = svg.append("g").attr("class", "camera-layer");

CAMERAS.forEach(cam => {
  const cx = rx(cam.x), cy = ry(cam.y);
  const g = gCams.append("g").attr("transform", `translate(${cx},${cy})`);

  if (cam.type === "poe") {
    // Wall-mounted: square with rounded corners
    g.append("rect").attr("x", -10).attr("y", -7).attr("width", 20).attr("height", 14)
      .attr("rx", 3).attr("fill", "#a78bfa").attr("opacity", 0.9);
    g.append("circle").attr("r", 3).attr("fill", "#fff").attr("opacity", 0.6);
  } else {
    // OAK-D on tripod: circle
    g.append("circle").attr("r", 12).attr("fill", "#f4845f").attr("opacity", 0.9);
    g.append("circle").attr("r", 4).attr("fill", "#fff").attr("opacity", 0.5);
  }

  g.append("text")
    .attr("dy", cam.type === "poe" ? -12 : -18)
    .attr("text-anchor", "middle").attr("font-size", 10).attr("font-weight", 600)
    .attr("font-family", "var(--font-mono)").attr("fill", "#1c1917")
    .text(cam.label);

  g.on("mousemove", e => {
    const typeLabel = cam.type === "poe" ? "PoE Ethernet Camera (overhead)" : "OAK-D on Tripod (free-standing)";
    showTip(e, `<strong>${cam.label}</strong><div class="tt-type">${typeLabel}</div>FOV: ${cam.fov}°`);
  }).on("mouseleave", hideTip);
});

// ─── Layer: Connection lines ──────────────────────────────────────────────

const gLines = svg.append("g").attr("class", "lines-layer");

// Perception agents → bus (publish lines)
percAgents.forEach(a => {
  gLines.append("line")
    .attr("class", "conn conn-pub")
    .attr("data-agent", a.id)
    .attr("x1", a.sx).attr("y1", a.sy + 10)
    .attr("x2", a.sx).attr("y2", busScreenY - 10)
    .attr("stroke", "#f4845f").attr("stroke-width", 1.5).attr("stroke-opacity", 0.35)
    .attr("marker-end", "url(#arrow-pub)");
});

// Bus → reactive agents (subscribe lines)
reactiveAgents.forEach(a => {
  const startX = Math.min(Math.max(a.sx, busX + 10), busX + busW - 10);
  gLines.append("line")
    .attr("class", "conn conn-sub")
    .attr("data-agent", a.id)
    .attr("x1", startX).attr("y1", busScreenY + 10)
    .attr("x2", a.sx).attr("y2", a.sy - 14)
    .attr("stroke", "#34d399").attr("stroke-width", 1.5).attr("stroke-opacity", 0.3)
    .attr("marker-end", "url(#arrow-sub)");
});

// V-JEPA → bus
gLines.append("line")
  .attr("class", "conn conn-vjepa").attr("data-agent", "vjepa")
  .attr("x1", vjepa.sx + 10).attr("y1", vjepa.sy - 6)
  .attr("x2", busX + 20).attr("y2", busScreenY + 10)
  .attr("stroke", "#38bdf8").attr("stroke-width", 1.5).attr("stroke-opacity", 0.35)
  .attr("marker-end", "url(#arrow-vjepa)");

// Discord bot ↔ bus
gLines.append("line")
  .attr("class", "conn conn-discord").attr("data-agent", "discord-bot")
  .attr("x1", discordBot.sx - 10).attr("y1", discordBot.sy)
  .attr("x2", busX + busW - 20).attr("y2", busScreenY + 10)
  .attr("stroke", "#a78bfa").attr("stroke-width", 1.5).attr("stroke-opacity", 0.35)
  .attr("marker-end", "url(#arrow-discord)");

// Orchestrator ↔ bus (dashed)
gLines.append("line")
  .attr("class", "conn conn-orch").attr("data-agent", "orchestrator")
  .attr("x1", orch.sx - 10).attr("y1", orch.sy)
  .attr("x2", busX + busW - 40).attr("y2", busScreenY + 10)
  .attr("stroke", "#94a3b8").attr("stroke-width", 1.5).attr("stroke-opacity", 0.25)
  .attr("stroke-dasharray", "5,4")
  .attr("marker-end", "url(#arrow-orch)");

// ─── Layer: Perception agent nodes (above bus) ────────────────────────────

const gPerc = svg.append("g").attr("class", "perc-layer");

percAgents.forEach(a => {
  const g = gPerc.append("g").attr("transform", `translate(${a.sx},${a.sy})`)
    .attr("data-id", a.id).attr("class", "agent-node");
  g.append("circle").attr("r", 10).attr("fill", "#f4845f").attr("opacity", 0.85);
  g.append("text").attr("dy", -16).attr("text-anchor", "middle")
    .attr("font-size", 9).attr("font-weight", 500).attr("fill", "#1c1917")
    .attr("font-family", "var(--font-mono)").text(a.label.split(" ")[0]);
  g.on("mousemove", e => {
    showTip(e, `<strong>${a.label}</strong><div class="tt-type">Perception Agent</div><div class="tt-list">Publishes: ${a.publishes.join(", ")}</div>`);
  }).on("mouseleave", hideTip)
   .on("click", e => { highlightAgent(a.id); e.stopPropagation(); });
});

// ─── Layer: Software agent nodes (band below room) ────────────────────────

const gAgents = svg.append("g").attr("class", "agents-layer");

// Section label
gAgents.append("text")
  .attr("x", MARGIN.left + 10).attr("y", agentBandTop + 6)
  .attr("font-size", 9).attr("font-weight", 600).attr("letter-spacing", "0.2em")
  .attr("text-transform", "uppercase").attr("fill", "#a8a29e")
  .attr("font-family", "var(--font-mono)").text("SOFTWARE AGENTS");

// Reactive agents
reactiveAgents.forEach(a => {
  const g = gAgents.append("g").attr("transform", `translate(${a.sx},${a.sy})`)
    .attr("data-id", a.id).attr("class", "agent-node");
  g.append("circle").attr("r", 12).attr("fill", "#34d399").attr("opacity", 0.85);
  g.append("text").attr("dy", "0.35em").attr("text-anchor", "middle")
    .attr("font-size", 7).attr("font-weight", 600).attr("fill", "#fff")
    .attr("font-family", "var(--font-mono)")
    .text(a.label.length > 8 ? a.label.substring(0, 7) + "…" : a.label);
  g.append("text").attr("dy", 24).attr("text-anchor", "middle")
    .attr("font-size", 8).attr("fill", "#57534e")
    .attr("font-family", "var(--font-mono)").text(a.student || "");
  g.on("mousemove", e => {
    showTip(e, `<strong>${a.label}</strong>${a.student ? ` — ${a.student}` : ""}<div class="tt-type">Reactive Agent</div><div class="tt-list">Subscribes: ${a.subscribes.join(", ")}<br>Publishes: ${a.publishes.join(", ")}</div>`);
  }).on("mouseleave", hideTip)
   .on("click", e => { highlightAgent(a.id); e.stopPropagation(); });
});

// V-JEPA node
const gVjepa = gAgents.append("g").attr("transform", `translate(${vjepa.sx},${vjepa.sy})`)
  .attr("data-id", "vjepa").attr("class", "agent-node");
gVjepa.append("circle").attr("r", 12).attr("fill", "#38bdf8").attr("opacity", 0.85);
gVjepa.append("text").attr("dy", "0.35em").attr("text-anchor", "middle")
  .attr("font-size", 7).attr("font-weight", 600).attr("fill", "#fff")
  .attr("font-family", "var(--font-mono)").text("V-JEPA");
gVjepa.append("text").attr("dy", 22).attr("text-anchor", "middle")
  .attr("font-size", 8).attr("fill", "#57534e")
  .attr("font-family", "var(--font-mono)").text("Classification");
gVjepa.on("mousemove", e => {
  showTip(e, `<strong>V-JEPA Probe</strong><div class="tt-type">Classification Agent</div><div class="tt-list">Publishes: probe_classification<br>Runs on GPU computer</div>`);
}).on("mouseleave", hideTip)
 .on("click", e => { highlightAgent("vjepa"); e.stopPropagation(); });

// Discord bot node
const gDiscord = gAgents.append("g").attr("transform", `translate(${discordBot.sx},${discordBot.sy})`)
  .attr("data-id", "discord-bot").attr("class", "agent-node");
gDiscord.append("circle").attr("r", 14).attr("fill", "#a78bfa").attr("opacity", 0.85);
gDiscord.append("text").attr("dy", "0.35em").attr("text-anchor", "middle")
  .attr("font-size", 7).attr("font-weight", 600).attr("fill", "#fff")
  .attr("font-family", "var(--font-mono)").text("Discord");
gDiscord.append("text").attr("dy", 24).attr("text-anchor", "middle")
  .attr("font-size", 8).attr("fill", "#57534e")
  .attr("font-family", "var(--font-mono)").text("Human Interface");
gDiscord.on("mousemove", e => {
  showTip(e, `<strong>Discord Bot</strong><div class="tt-type">Interface Agent</div><div class="tt-list">Subscribes: person_change, fatigue_change, whiteboard_change, room_mode_change<br>Publishes: phase.command, agent.message</div>`);
}).on("mouseleave", hideTip)
 .on("click", e => { highlightAgent("discord-bot"); e.stopPropagation(); });

// Orchestrator node (dashed, future)
const gOrch = gAgents.append("g").attr("transform", `translate(${orch.sx},${orch.sy})`)
  .attr("data-id", "orchestrator").attr("class", "agent-node");
gOrch.append("circle").attr("r", 16).attr("fill", "url(#hatch)").attr("stroke", "#94a3b8")
  .attr("stroke-width", 2).attr("stroke-dasharray", "4,3").attr("opacity", 0.5);
gOrch.append("text").attr("dy", "-1px").attr("text-anchor", "middle")
  .attr("font-size", 7).attr("font-weight", 500).attr("fill", "#94a3b8")
  .attr("font-family", "var(--font-mono)").text("Orch.");
gOrch.append("text").attr("dy", 28).attr("text-anchor", "middle")
  .attr("font-size", 7).attr("font-style", "italic").attr("fill", "#94a3b8")
  .attr("font-family", "var(--font-sans)").text("designed, not yet built");
gOrch.on("mousemove", e => {
  showTip(e, `<strong>Orchestrator</strong><div class="tt-type">Conductor Agent (designed)</div>Holds room context and routes events by salience.<div class="tt-list">Would subscribe: person, fatigue, gaze, whiteboard, V-JEPA<br>Would publish: room_mode_change, phase_change</div>`);
}).on("mouseleave", hideTip)
 .on("click", e => { highlightAgent("orchestrator"); e.stopPropagation(); });

// ─── Click-to-highlight ───────────────────────────────────────────────────

function highlightAgent(agentId) {
  const a = AGENTS.find(x => x.id === agentId);
  if (!a) return;

  // Find related agents via shared event types
  const related = new Set([agentId]);
  a.publishes.forEach(evt => {
    AGENTS.filter(o => o.subscribes.includes(evt)).forEach(o => related.add(o.id));
  });
  a.subscribes.forEach(evt => {
    AGENTS.filter(o => o.publishes.includes(evt)).forEach(o => related.add(o.id));
  });

  svg.selectAll(".agent-node").attr("opacity", d => {
    const id = d3.select(d).attr?.("data-id");
    return null; // handled below
  });
  svg.selectAll(".agent-node").each(function() {
    const id = d3.select(this).attr("data-id");
    d3.select(this).attr("opacity", related.has(id) ? 1 : 0.1);
  });
  svg.selectAll(".conn").each(function() {
    const id = d3.select(this).attr("data-agent");
    d3.select(this).attr("stroke-opacity", related.has(id) ? 0.6 : 0.05);
  });

  // Dim cameras and infra
  gCams.attr("opacity", 0.15);
  gInfra.attr("opacity", 0.15);
  gBus.select("rect").attr("opacity", 1);
}

svg.on("click", () => {
  svg.selectAll(".agent-node").attr("opacity", 1);
  svg.selectAll(".conn").each(function() {
    d3.select(this).attr("stroke-opacity", 0.35);
  });
  gCams.attr("opacity", 1);
  gInfra.attr("opacity", 1);
});

// ─── Toggle controls ──────────────────────────────────────────────────────

document.getElementById("tog-people").addEventListener("change", function() {
  gPeople.style("display", this.checked ? null : "none");
});
document.getElementById("tog-fov").addEventListener("change", function() {
  gFov.style("display", this.checked ? null : "none");
});
document.getElementById("tog-lines").addEventListener("change", function() {
  gLines.style("display", this.checked ? null : "none");
});

// ─── Export SVG ───────────────────────────────────────────────────────────

document.getElementById("btn-export").addEventListener("click", () => {
  const svgEl = document.getElementById("main-svg");
  const clone = svgEl.cloneNode(true);
  // Inline the fonts for export
  const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
  style.textContent = `
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  `;
  clone.prepend(style);
  const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "multi-agent-classroom-network.svg"; a.click();
  URL.revokeObjectURL(url);
});

</script>
